<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gerador de Conteúdo Semanal</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500;600&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --dark: #080808; --surface: #111; --surface2: #181818; --surface3: #202020;
    --text: #F0EDE8; --muted: #666660; --border: #222;
    --ms-gold: #C9A84C; --ms-gold-light: #E8C96A;
    --pf-blue: #2979FF; --pf-cyan: #00E5FF;
    --ig: #E1306C; --tt: #69C9D0; --yt: #FF4444;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:'DM Sans',sans-serif; background:var(--dark); color:var(--text); min-height:100vh; padding-bottom:80px; }

  /* CHANNEL TABS */
  .channel-tabs { position:sticky; top:0; z-index:100; background:var(--dark); border-bottom:1px solid var(--border); display:grid; grid-template-columns:1fr 1fr; }
  .ch-tab { padding:16px 8px; background:transparent; border:none; border-bottom:2px solid transparent; margin-bottom:-1px; cursor:pointer; font-family:'DM Sans',sans-serif; font-size:0.75rem; font-weight:600; letter-spacing:0.08em; text-transform:uppercase; color:var(--muted); transition:color 0.2s; display:flex; align-items:center; justify-content:center; gap:7px; }
  .ch-tab.ms.active { color:var(--ms-gold); border-bottom-color:var(--ms-gold); }
  .ch-tab.pf.active { color:var(--pf-cyan); border-bottom-color:var(--pf-blue); }

  /* PANELS */
  .panel { display:none; padding:28px 14px; max-width:580px; margin:0 auto; }
  .panel.active { display:block; }
  .panel-header { text-align:center; margin-bottom:28px; }
  .icon { font-size:2rem; display:block; margin-bottom:8px; }
  .ms-icon { filter:drop-shadow(0 0 10px #C9A84C88); }
  .pf-icon { filter:drop-shadow(0 0 10px #2979FF88); }
  .ms-title { font-family:'Playfair Display',serif; font-size:clamp(1.5rem,5vw,2.2rem); font-weight:900; background:linear-gradient(135deg,var(--ms-gold-light),var(--ms-gold)); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; }
  .pf-title { font-family:'Space Mono',monospace; font-size:clamp(1.1rem,4vw,1.7rem); font-weight:700; background:linear-gradient(135deg,var(--pf-cyan),var(--pf-blue)); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; }
  .subtitle { color:var(--muted); font-size:0.72rem; letter-spacing:0.14em; text-transform:uppercase; margin-top:5px; }

  /* HISTORY BAR */
  .history-bar { display:flex; align-items:center; justify-content:space-between; margin-bottom:16px; padding:10px 14px; background:var(--surface2); border:1px solid var(--border); border-radius:3px; font-size:0.75rem; }
  .history-info { color:var(--muted); }
  .history-info span { font-weight:600; color:var(--text); }
  .history-actions { display:flex; align-items:center; gap:8px; }
  .toggle-record { display:flex; align-items:center; gap:6px; font-size:0.72rem; color:var(--muted); cursor:pointer; font-family:'DM Sans',sans-serif; background:none; border:none; padding:0; }
  .toggle-dot { width:28px; height:16px; border-radius:8px; background:#4CAF50; position:relative; transition:background 0.2s; flex-shrink:0; }
  .toggle-dot.off { background:#444; }
  .toggle-dot::after { content:''; position:absolute; top:2px; left:2px; width:12px; height:12px; border-radius:50%; background:#fff; transition:transform 0.2s; }
  .toggle-dot:not(.off)::after { transform:translateX(12px); }
  .clear-btn { font-size:0.7rem; padding:4px 10px; background:transparent; border:1px solid #3a1a1a; color:#ff6b6b; border-radius:2px; cursor:pointer; font-family:'DM Sans',sans-serif; transition:all 0.15s; }
  .clear-btn:hover { background:#3a1a1a; }

  /* BUTTON */
  .gen-btn { display:block; width:100%; padding:15px 24px; border:none; border-radius:3px; cursor:pointer; font-family:'DM Sans',sans-serif; font-weight:700; font-size:0.88rem; letter-spacing:0.06em; text-transform:uppercase; transition:all 0.2s; margin-bottom:16px; }
  .gen-btn:disabled { opacity:0.45; cursor:not-allowed; transform:none !important; box-shadow:none !important; }
  .ms-btn { background:linear-gradient(135deg,var(--ms-gold),var(--ms-gold-light)); color:#0A0A0A; }
  .ms-btn:hover:not(:disabled) { transform:translateY(-2px); box-shadow:0 8px 24px #C9A84C44; }
  .pf-btn { background:linear-gradient(135deg,var(--pf-blue),var(--pf-cyan)); color:#000; }
  .pf-btn:hover:not(:disabled) { transform:translateY(-2px); box-shadow:0 8px 24px #2979FF44; }

  /* LOADING / ERROR */
  .loading { text-align:center; font-size:0.75rem; letter-spacing:0.12em; text-transform:uppercase; margin-bottom:24px; display:none; }
  .loading.active { display:block; }
  .ms-loading { color:var(--ms-gold); } .pf-loading { color:var(--pf-cyan); }
  .dot::after { content:''; animation:dots 1.4s infinite; }
  @keyframes dots { 0%{content:''} 33%{content:'.'} 66%{content:'..'} 100%{content:'...'} }
  .err { background:#140808; border:1px solid #5a2020; border-radius:3px; padding:12px 16px; color:#ff8080; font-size:0.8rem; text-align:center; margin-bottom:18px; display:none; }
  .err.active { display:block; }
  .output { display:none; } .output.active { display:block; }
  .week-label { text-align:center; font-size:0.68rem; letter-spacing:0.2em; text-transform:uppercase; margin-bottom:24px; }
  .ms-week { color:var(--ms-gold); } .pf-week { color:var(--pf-cyan); }

  /* THEME CARD */
  .theme-card { background:var(--surface); border:1px solid var(--border); border-radius:4px; margin-bottom:24px; overflow:hidden; animation:fadeUp 0.4s ease forwards; opacity:0; transform:translateY(12px); }
  .theme-card:nth-child(2){animation-delay:0.08s} .theme-card:nth-child(3){animation-delay:0.16s} .theme-card:nth-child(4){animation-delay:0.24s}
  @keyframes fadeUp { to{opacity:1;transform:translateY(0)} }
  .ms-card { border-top:2px solid var(--ms-gold); } .pf-card { border-top:2px solid var(--pf-blue); }

  .card-top { padding:14px 16px; background:var(--surface2); border-bottom:1px solid var(--border); }
  .card-day { font-size:0.62rem; letter-spacing:0.16em; text-transform:uppercase; font-weight:600; margin-bottom:3px; }
  .ms-day { color:var(--ms-gold); } .pf-day { color:var(--pf-cyan); }
  .card-tema { font-size:0.95rem; font-weight:700; color:var(--text); line-height:1.3; }
  .ms-tema { font-family:'Playfair Display',serif; }
  .pf-tema { font-family:'Space Mono',monospace; font-size:0.82rem; }
  .card-angulo { font-size:0.78rem; color:var(--muted); margin-top:4px; line-height:1.4; }

  /* CARD SECTIONS */
  .card-section { padding:14px 16px; border-bottom:1px solid var(--border); }
  .card-section.no-border { border-bottom:none; }
  .sec-label { font-size:0.58rem; letter-spacing:0.18em; text-transform:uppercase; color:var(--muted); margin-bottom:8px; display:flex; align-items:center; gap:5px; }
  .sec-label::after { content:''; flex:1; height:1px; background:var(--border); }
  .sec-text { font-size:0.83rem; line-height:1.7; color:#CCCAC4; white-space:pre-wrap; }
  .char-count { font-size:0.65rem; color:var(--muted); margin-top:3px; }

  /* SCENE LIST */
  .scene-list { list-style:none; }
  .scene-item { display:flex; gap:10px; padding:8px 0; border-bottom:1px solid #1a1a1a; font-size:0.82rem; line-height:1.5; }
  .scene-item:last-child { border-bottom:none; }
  .scene-num { flex-shrink:0; width:22px; height:22px; background:var(--border); border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:0.6rem; font-weight:700; color:var(--muted); margin-top:1px; }
  .ms-card .scene-num { background:#C9A84C22; color:var(--ms-gold); }
  .pf-card .scene-num { background:#2979FF22; color:var(--pf-blue); }
  .scene-body { flex:1; }
  .scene-text { color:#CCCAC4; margin-bottom:2px; }
  .scene-note { font-size:0.75rem; color:var(--muted); font-style:italic; }

  /* MUSIC BOX */
  .music-box { background:var(--surface3); border-radius:3px; padding:11px 13px; display:flex; align-items:flex-start; gap:10px; }
  .music-icon { font-size:1.1rem; flex-shrink:0; margin-top:1px; }
  .music-body { flex:1; }
  .music-name { font-size:0.85rem; font-weight:600; color:var(--text); }
  .music-why { font-size:0.75rem; color:var(--muted); margin-top:2px; line-height:1.4; }
  .music-trecho { font-size:0.75rem; color:var(--ms-gold); margin-top:5px; font-weight:600; }
  .pf-card .music-trecho { color:var(--pf-cyan); }

  /* PLATFORM TABS */
  .plat-tabs { display:flex; border-bottom:1px solid var(--border); background:var(--surface2); }
  .plat-tab { flex:1; padding:9px 4px; font-size:0.62rem; font-weight:700; letter-spacing:0.08em; text-transform:uppercase; cursor:pointer; border:none; background:transparent; color:var(--muted); border-bottom:2px solid transparent; margin-bottom:-1px; font-family:'DM Sans',sans-serif; transition:color 0.15s; display:flex; align-items:center; justify-content:center; gap:4px; }
  .plat-tab.tab-instagram.active { color:var(--ig); border-bottom-color:var(--ig); }
  .plat-tab.tab-tiktok.active { color:var(--tt); border-bottom-color:var(--tt); }
  .plat-tab.tab-youtube.active { color:var(--yt); border-bottom-color:var(--yt); }
  .plat-content { display:none; padding:14px 16px; }
  .plat-content.active { display:block; }

  /* COPY BUTTON */
  .copy-btn { display:inline-flex; align-items:center; gap:4px; margin-top:8px; padding:5px 11px; background:transparent; border:1px solid #2A2A2A; color:var(--muted); font-size:0.7rem; font-family:'DM Sans',sans-serif; border-radius:2px; cursor:pointer; transition:all 0.15s; }
  .ms-copy:hover { border-color:var(--ms-gold); color:var(--ms-gold); }
  .pf-copy:hover { border-color:var(--pf-cyan); color:var(--pf-cyan); }
  .copy-btn.copied { border-color:#4CAF50 !important; color:#4CAF50 !important; }

  /* PEXELS */
  .frame-videos { display:grid; grid-template-columns:repeat(3,1fr); gap:6px; padding:10px 16px 14px; background:var(--surface3); }
  .vid-thumb { position:relative; border-radius:3px; overflow:hidden; aspect-ratio:9/16; background:#1a1a1a; cursor:pointer; border:2px solid transparent; transition:border-color 0.15s; }
  .vid-thumb:hover { border-color:var(--ms-gold); }
  .pf-card .vid-thumb:hover { border-color:var(--pf-cyan); }
  .vid-thumb img { width:100%; height:100%; object-fit:cover; display:block; }
  .vid-thumb-overlay { position:absolute; inset:0; display:flex; flex-direction:column; justify-content:flex-end; padding:6px; background:linear-gradient(transparent 40%,rgba(0,0,0,0.75)); }
  .vid-dl-btn { display:block; width:100%; padding:5px; background:var(--ms-gold); color:#000; font-size:0.65rem; font-weight:700; font-family:"DM Sans",sans-serif; border:none; border-radius:2px; cursor:pointer; text-align:center; text-decoration:none; }
  .pf-card .vid-dl-btn { background:var(--pf-cyan); }
  .vid-dur { font-size:0.6rem; color:#ccc; text-align:center; margin-bottom:3px; }
  .pexels-loading { padding:10px 16px; font-size:0.75rem; color:var(--muted); font-style:italic; background:var(--surface3); }
  .pexels-err { padding:10px 16px; font-size:0.72rem; color:#ff8080; background:var(--surface3); }
  .pexels-key-bar { display:flex; gap:8px; align-items:center; margin-bottom:16px; padding:10px 14px; background:var(--surface2); border:1px solid var(--border); border-radius:3px; }
  .pexels-key-input { flex:1; background:var(--surface3); border:1px solid var(--border); color:var(--text); font-family:"DM Sans",sans-serif; font-size:0.78rem; padding:6px 10px; border-radius:2px; outline:none; }
  .pexels-key-input:focus { border-color:var(--ms-gold); }
  .pexels-key-save { padding:6px 14px; background:var(--ms-gold); color:#000; font-family:"DM Sans",sans-serif; font-size:0.72rem; font-weight:700; border:none; border-radius:2px; cursor:pointer; white-space:nowrap; }
  .pexels-key-label { font-size:0.68rem; color:var(--muted); white-space:nowrap; }
</style>
</head>
<body>

<div class="channel-tabs">
  <button class="ch-tab ms active" onclick="switchChannel('ms')">🧠 Mente Superior</button>
  <button class="ch-tab pf" onclick="switchChannel('pf')">🚗 Piloto Financeiro</button>
</div>

<!-- MENTE SUPERIOR -->
<div class="panel active" id="panel-ms">
  <div class="panel-header">
    <span class="icon ms-icon">🧠</span>
    <div class="ms-title">Mente Superior</div>
    <p class="subtitle">Instagram · TikTok · YouTube Shorts</p>
  </div>
  <button class="gen-btn ms-btn" id="ms-btn" onclick="generateMS()">✦ Gerar Semana</button>
  <div class="history-bar">
    <div class="history-info">Histórico: <span id="ms-hist-count">0</span> temas salvos</div>
    <div class="history-actions">
      <button class="toggle-record" onclick="toggleRecord('ms')">
        <div class="toggle-dot" id="ms-toggle-dot"></div>
        <span id="ms-toggle-label">Gravando</span>
      </button>
      <button class="clear-btn" onclick="clearHistory('ms')">🗑 Limpar</button>
    </div>
  </div>
  <div class="pexels-key-bar" id="ms-pexels-bar">
    <span class="pexels-key-label">🎬 Pexels API</span>
    <input class="pexels-key-input" id="pexels-key-input" placeholder="Cole sua API key do Pexels" type="password">
    <button class="pexels-key-save" onclick="savePexelsKey()">Salvar</button>
  </div>
  <div class="loading ms-loading" id="ms-loading"><span class="dot">Buscando tendências e criando conteúdo</span></div>
  <div class="err" id="ms-err"></div>
  <div class="output" id="ms-output"></div>
</div>

<!-- PILOTO FINANCEIRO -->
<div class="panel" id="panel-pf">
  <div class="panel-header">
    <span class="icon pf-icon">🚗</span>
    <div class="pf-title">Piloto Financeiro</div>
    <p class="subtitle">Instagram · TikTok</p>
  </div>
  <button class="gen-btn pf-btn" id="pf-btn" onclick="generatePF()">▶ Gerar Semana</button>
  <div class="history-bar">
    <div class="history-info">Histórico: <span id="pf-hist-count">0</span> temas salvos</div>
    <div class="history-actions">
      <button class="toggle-record" onclick="toggleRecord('pf')">
        <div class="toggle-dot" id="pf-toggle-dot"></div>
        <span id="pf-toggle-label">Gravando</span>
      </button>
      <button class="clear-btn" onclick="clearHistory('pf')">🗑 Limpar</button>
    </div>
  </div>
  <div class="loading pf-loading" id="pf-loading"><span class="dot">Buscando tendências e criando conteúdo</span></div>
  <div class="err" id="pf-err"></div>
  <div class="output" id="pf-output"></div>
</div>

<script>
/* ── STATE ── */
let cardCount = 0;
const recordingState = { ms: true, pf: true };

/* ── CHANNEL SWITCH ── */
function switchChannel(ch) {
  document.querySelectorAll('.ch-tab').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.querySelector('.ch-tab.' + ch).classList.add('active');
  document.getElementById('panel-' + ch).classList.add('active');
}

/* ── PLATFORM TAB SWITCH ── */
function switchPlatTab(cardId, plat) {
  const card = document.getElementById(cardId);
  if (!card) return;
  card.querySelectorAll('.plat-tab').forEach(t => t.classList.remove('active'));
  card.querySelectorAll('.plat-content').forEach(c => c.classList.remove('active'));
  const tabEl = card.querySelector('.plat-tab.tab-' + plat);
  const contEl = card.querySelector('.plat-content.content-' + plat);
  if (tabEl) tabEl.classList.add('active');
  if (contEl) contEl.classList.add('active');
}

/* ── HISTORY ── */
function getHistory(key) {
  try { return JSON.parse(localStorage.getItem(key + '_history') || '[]'); } catch { return []; }
}
function saveHistory(key, temas) {
  if (!recordingState[key]) return;
  const all = [...getHistory(key), ...temas].slice(-30);
  localStorage.setItem(key + '_history', JSON.stringify(all));
  updateHistoryUI(key);
}
function clearHistory(key) {
  localStorage.removeItem(key + '_history');
  updateHistoryUI(key);
}
function toggleRecord(key) {
  recordingState[key] = !recordingState[key];
  document.getElementById(key + '-toggle-dot').classList.toggle('off', !recordingState[key]);
  document.getElementById(key + '-toggle-label').textContent = recordingState[key] ? 'Gravando' : 'Pausado';
}
function updateHistoryUI(key) {
  const el = document.getElementById(key + '-hist-count');
  if (el) el.textContent = getHistory(key).length;
}
function historyNote(key) {
  const h = getHistory(key);
  if (!h.length) return '';
  return '\n\nTEMAS JÁ USADOS — NÃO REPETIR nenhum deste histórico:\n' + h.map((t, i) => (i+1) + '. ' + t).join('\n');
}

/* ── UTILS ── */
function today() {
  return new Date().toLocaleDateString('pt-BR', { day:'2-digit', month:'long', year:'numeric' });
}
function esc(str) {
  return (str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
function copyText(elId, btn, label) {
  navigator.clipboard.writeText(document.getElementById(elId).innerText).then(() => {
    btn.textContent = '✓ Copiado!'; btn.classList.add('copied');
    setTimeout(() => { btn.textContent = '📋 Copiar ' + label; btn.classList.remove('copied'); }, 2000);
  });
}
function copyScriptText(cid, btn) {
  const el = document.getElementById(cid + '-script');
  const text = el.dataset.raw || el.textContent;
  navigator.clipboard.writeText(text).then(() => {
    btn.textContent = '✓ Copiado!'; btn.classList.add('copied');
    setTimeout(() => { btn.textContent = '📋 Copiar Script Completo'; btn.classList.remove('copied'); }, 2000);
  });
}

/* ── BUILD SCENES HTML ── */
function buildScenes(frames, cid, cardClass) {
  if (!frames || !frames.length) return '<p style="color:var(--muted);font-size:0.8rem">—</p>';
  return '<ul class="scene-list">' + frames.map((f, i) => {
    const pexelsId = cid + '-pexels-' + i;
    return `
    <li class="scene-item" style="flex-direction:column;gap:6px;">
      <div style="display:flex;gap:10px;align-items:flex-start;">
        <span class="scene-num">${i + 1}</span>
        <div class="scene-body">
          <div class="scene-text">${esc(f.texto || '')}</div>
          <div class="scene-note">${esc(f.cena || '')}</div>
        </div>
      </div>
      <div id="${pexelsId}" style="width:100%;"></div>
    </li>`;
  }).join('') + '</ul>';
}

/* ── RENDER CARDS ── */
function renderCards(posts, outputEl, days, cardClass, dayClass, copyClass, temaClass, platforms) {
  posts.forEach((post, i) => {
    cardCount++;
    const cid = 'card-' + cardCount;
    const card = document.createElement('div');
    card.className = 'theme-card ' + cardClass;
    card.id = cid;

    const tabsHtml = platforms.map((p, idx) =>
      `<button class="plat-tab tab-${p.key}${idx===0?' active':''}" onclick="switchPlatTab('${cid}','${p.key}')">${p.icon} ${p.label}</button>`
    ).join('');

    let platHtml = '';
    platforms.forEach((p, idx) => {
      const d = ((post.plataformas || {})[p.key]) || {};
      const act = idx === 0 ? ' active' : '';
      if (p.key === 'youtube') {
        const len = (d.titulo || '').length;
        platHtml += `
          <div class="plat-content content-youtube${act}">
            <div class="sec-label">Título</div>
            <div class="sec-text" id="${cid}-yt-ti">${esc(d.titulo || '')}</div>
            <div class="char-count">${len}/100 caracteres</div>
            <button class="copy-btn ${copyClass}" onclick="copyText('${cid}-yt-ti',this,'Título')">📋 Copiar Título</button>
            <div class="sec-label" style="margin-top:12px">Descrição + Hashtags</div>
            <div class="sec-text" id="${cid}-yt-desc">${esc((d.descricao||'') + '\n\n' + (d.hashtags||''))}</div>
            <button class="copy-btn ${copyClass}" onclick="copyText('${cid}-yt-desc',this,'Descrição')">📋 Copiar Descrição</button>
          </div>`;
      } else {
        platHtml += `
          <div class="plat-content content-${p.key}${act}">
            <div class="sec-label">Legenda + Hashtags</div>
            <div class="sec-text" id="${cid}-${p.key}-cap">${esc((d.legenda||'') + '\n\n' + (d.hashtags||''))}</div>
            <button class="copy-btn ${copyClass}" onclick="copyText('${cid}-${p.key}-cap',this,'Legenda')">📋 Copiar Legenda</button>
          </div>`;
      }
    });

    const musica = post.musica || {};
    const scriptLines = (post.frames||[]).map((f,j) => `Frame ${j+1}: ${f.texto||''}\nCena: ${f.cena||''}`).join('\n\n');

    card.innerHTML = `
      <div class="card-top">
        <div class="card-day ${dayClass}">${days[i] || ''}</div>
        <div class="card-tema ${temaClass}">${esc(post.tema || '')}</div>
        <div class="card-angulo">${esc(post.angulo || '')}</div>
      </div>
      <div class="card-section">
        <div class="sec-label">🎵 Música (CapCut)</div>
        <div class="music-box">
          <span class="music-icon">🎵</span>
          <div class="music-body">
            <div class="music-name">${esc(musica.nome || '')}</div>
            <div class="music-why">${esc(musica.motivo || '')}</div>
            ${musica.trecho ? `<div class="music-trecho">▶ Começar em: ${esc(musica.trecho)}</div>` : ''}
          </div>
        </div>
      </div>
      <div class="card-section no-border">
        <div class="sec-label">🎬 Script + Cenas</div>
        ${buildScenes(post.frames, cid, cardClass)}

/* ── API CALL ── */
async function callAPI(prompt, btnId, loadingId, outputId, errId, renderFn) {
  const btn = document.getElementById(btnId);
  const loading = document.getElementById(loadingId);
  const output = document.getElementById(outputId);
  const errBox = document.getElementById(errId);
  btn.disabled = true; loading.classList.add('active');
  output.classList.remove('active'); output.innerHTML = ''; errBox.classList.remove('active');

  const lbl = document.createElement('p');
  lbl.className = 'week-label ' + (btnId.startsWith('ms') ? 'ms-week' : 'pf-week');
  lbl.textContent = 'Semana de ' + today();
  output.appendChild(lbl);

  try {
    const res = await fetch("https://api.anthropic.com/v1/messages", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        model: "claude-sonnet-4-20250514",
        max_tokens: 8000,
        tools: [{ type: "web_search_20250305", name: "web_search" }],
        messages: [{ role: "user", content: prompt }]
      })
    });
    const data = await res.json();
    let raw = '';
    for (const b of data.content) { if (b.type === 'text') raw += b.text; }
    const m = raw.match(/\{[\s\S]*\}/);
    const parsed = JSON.parse(m ? m[0] : raw.replace(/```json|```/g,'').trim());
    renderFn(parsed.posts, output);
    output.classList.add('active');
  } catch (err) {
    errBox.textContent = 'Erro ao gerar conteúdo. Tente novamente.';
    errBox.classList.add('active');
    console.error(err);
  } finally {
    btn.disabled = false; loading.classList.remove('active');
  }
}

async function fetchPexelsVideos(query, frameEl, cardClass) {
  const pexelsKey = getPexelsKey();
  const searchUrl = 'https://www.pexels.com/search/videos/' + encodeURIComponent(query) + '/';
  const isMS = cardClass.includes('ms');

  // Always show the search link fallback immediately
  const fallback = document.createElement('div');
  fallback.style.cssText = 'padding:6px 0 2px;';
  fallback.innerHTML = `<a href="${searchUrl}" target="_blank" style="font-size:0.72rem;color:${isMS ? 'var(--ms-gold)' : 'var(--pf-cyan)'};text-decoration:none;">🔍 Buscar "${query}" no Pexels →</a>`;
  frameEl.appendChild(fallback);

  if (!pexelsKey) return;

  // Try to load thumbnails via proxy (works when hosted online)
  try {
    const proxies = [
      'https://corsproxy.io/?' + encodeURIComponent('https://api.pexels.com/videos/search?query=' + encodeURIComponent(query) + '&per_page=3&orientation=portrait'),
      'https://api.allorigins.win/raw?url=' + encodeURIComponent('https://api.pexels.com/videos/search?query=' + encodeURIComponent(query) + '&per_page=3&orientation=portrait'),
    ];

    let data = null;
    for (const proxyUrl of proxies) {
      try {
        const res = await fetch(proxyUrl, { headers: { Authorization: pexelsKey } });
        if (res.ok) { data = await res.json(); break; }
      } catch(e) { continue; }
    }

    if (!data || !data.videos || !data.videos.length) return;

    const grid = document.createElement('div');
    grid.className = 'frame-videos';
    data.videos.forEach(v => {
      const file = v.video_files.find(f => f.quality === 'hd' && f.width < f.height)
                || v.video_files.find(f => f.width < f.height)
                || v.video_files[0];
      const dur = Math.round(v.duration) + 's';
      const url = file ? file.link : searchUrl;
      grid.innerHTML += `
        <div class="vid-thumb">
          <img src="${v.image}" loading="lazy" alt="${query}">
          <div class="vid-thumb-overlay">
            <div class="vid-dur">${dur}</div>
            <a class="vid-dl-btn" href="${url}" target="_blank">⬇ Baixar</a>
          </div>
        </div>`;
    });
    // Replace fallback link with grid if proxy worked
    fallback.replaceWith(grid);
    const credit = document.createElement('div');
    credit.style.cssText = 'padding:0 0 4px;font-size:0.6rem;color:var(--muted)';
    credit.innerHTML = 'Vídeos por <a href="https://pexels.com" target="_blank" style="color:var(--muted)">Pexels</a>';
    frameEl.appendChild(credit);
  } catch(e) {
    // Fallback link already shown, silently ignore
    console.warn('Pexels proxy failed, using search link fallback:', e);
  }
}
